<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Hamara Brand</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root{--bg:#071017;--panel:#0e1b24;--panel2:#122330;--text:#eef4f7;--muted:#97aeb9;--line:rgba(255,255,255,.08);--accent:#d4af37;--cta:#ff6f00}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:radial-gradient(circle at top left, rgba(11,110,79,.22), transparent 26%), linear-gradient(180deg,#061018,#0a141c 55%,#081017);color:var(--text)}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1300px;margin:0 auto;padding:24px}
    .top{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap;padding:8px 0 28px}
    .brand{font-weight:900;letter-spacing:.06em}
    .toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .input,.button{border:none;border-radius:14px;padding:12px 14px;font:inherit}
    .input{min-width:280px;background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--line)}
    .button{background:var(--cta);color:#fff;font-weight:800;cursor:pointer}
    .panel{border:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));backdrop-filter:blur(12px);border-radius:24px;padding:20px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:0 0 18px}
    .stat{padding:16px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
    .stat .label{color:var(--muted);font-size:.85rem}
    .stat .value{font-size:1.65rem;font-weight:900;margin-top:6px}
    .table-wrap{overflow:auto;border-radius:18px;border:1px solid var(--line)}
    table{width:100%;border-collapse:collapse;min-width:1200px;background:rgba(7,16,24,.72)}
    th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:.92rem}
    th{position:sticky;top:0;background:#0b1520;color:#fff;z-index:1}
    td{color:var(--muted)}
    .status{margin:16px 0 0;color:var(--muted);font-size:.95rem}
    .status.error{color:#ffb4a8}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <div class="brand">HAMARA BRAND</div>
        <h1 style="margin:10px 0 0;font-size:clamp(2rem,4vw,3.5rem);line-height:1">Admin Dashboard</h1>
        <p style="margin:8px 0 0;color:var(--muted);max-width:760px">Live lead data from Google Sheets. Use the admin token to load records from the shared sheet.</p>
      </div>
      <div class="toolbar">
        <input id="token-input" class="input" type="password" placeholder="Admin token" />
        <button id="reload-btn" class="button">Load leads</button>
      </div>
    </header>

    <section class="stats" id="stats"></section>

    <section class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Created</th>
              <th>Name</th>
              <th>Company</th>
              <th>Phone</th>
              <th>Email</th>
              <th>City</th>
              <th>Budget</th>
              <th>Service</th>
              <th>Goal</th>
              <th>Mode</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody id="leads-body"></tbody>
        </table>
      </div>
      <div id="status" class="status">Waiting for data.</div>
    </section>
  </div>

  <script>
    const API_URL = '/api/admin-leads';
    const tokenInput = document.getElementById('token-input');
    const reloadBtn = document.getElementById('reload-btn');
    const leadsBody = document.getElementById('leads-body');
    const statusEl = document.getElementById('status');
    const statsEl = document.getElementById('stats');

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(value) {
      if (!value) return '—';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString();
    }

    function renderStats(rows) {
      const counts = rows.reduce((acc, row) => {
        const mode = (row.bot_mode || row.mode || 'unknown').toLowerCase();
        acc.total += 1;
        acc[mode] = (acc[mode] || 0) + 1;
        return acc;
      }, { total: 0 });

      statsEl.innerHTML = `
        <div class="stat"><div class="label">Total leads</div><div class="value">${counts.total}</div></div>
        <div class="stat"><div class="label">Buyer</div><div class="value">${counts.buyer || 0}</div></div>
        <div class="stat"><div class="label">Partner</div><div class="value">${counts.partner || 0}</div></div>
      `;
    }

    function renderRows(rows) {
      leadsBody.innerHTML = rows.map(row => `
        <tr>
          <td>${escapeHtml(formatDate(row.created_at || row.inserted_at || row.createdAt))}</td>
          <td>${escapeHtml(row.name)}</td>
          <td>${escapeHtml(row.company)}</td>
          <td>${escapeHtml(row.phone)}</td>
          <td>${escapeHtml(row.email)}</td>
          <td>${escapeHtml(row.city)}</td>
          <td>${escapeHtml(row.budget)}</td>
          <td>${escapeHtml(row.service)}</td>
          <td>${escapeHtml(row.objective)}</td>
          <td>${escapeHtml(row.bot_mode || row.mode)}</td>
          <td>${escapeHtml(row.source)}</td>
        </tr>
      `).join('') || '<tr><td colspan="11">No leads found.</td></tr>';
    }

    async function loadLeads() {
      const token = tokenInput.value.trim();
      statusEl.textContent = 'Loading...';
      statusEl.classList.remove('error');
      try {
        const resp = await fetch(`${API_URL}?limit=200`, {
          headers: token ? { 'X-Admin-Token': token } : {},
        });
        const result = await resp.json();
        if (!resp.ok) {
          throw new Error(result.error || 'Failed to load leads');
        }

        const rows = Array.isArray(result.data) ? result.data : [];
        renderStats(rows);
        renderRows(rows);
        statusEl.textContent = `Loaded ${rows.length} lead${rows.length === 1 ? '' : 's'}.`;
      } catch (err) {
        statusEl.textContent = err.message;
        statusEl.classList.add('error');
        leadsBody.innerHTML = '<tr><td colspan="11">Unable to load leads.</td></tr>';
        statsEl.innerHTML = '';
      }
    }

    reloadBtn.addEventListener('click', loadLeads);
    tokenInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') loadLeads();
    });
  </script>
</body>
</html>
